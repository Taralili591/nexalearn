<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaLearn AI Academy - 成果与影响</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@400;500;600&family=Roboto+Mono:wght@400;500&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@1.7.0"></script>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen flex flex-col" style="background: var(--traeui-background-1);">
      <header class="w-full flex items-center justify-between px-6 lg:px-8 py-4" style="min-height: 56px;">
        <a href="封面.html" class="traeui-h5 text-base font-semibold tracking-wide" style="color: var(--traeui-accent-1);">NexaLearn</a>
        <nav class="hidden md:flex items-center gap-6">
          <a href="公司介绍.html" style="color: var(--traeui-accent-2); font-family: var(--font-mono); font-size: 12px;">关于我们</a>
          <a href="核心服务.html" style="color: var(--traeui-accent-2); font-family: var(--font-mono); font-size: 12px;">核心服务</a>
          <a href="学习平台.html" style="color: var(--traeui-accent-2); font-family: var(--font-mono); font-size: 12px;">学习平台</a>
          <a href="联系我们.html" class="page-btn" style="padding: 6px 16px; font-size: 11px;">联系</a>
        </nav>
        <button id="mobile-menu-btn" class="md:hidden p-2" style="color: var(--traeui-accent-1);" aria-label="Toggle menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </header>

      <div id="mobile-menu" class="hidden md:hidden absolute top-14 right-0 z-30 w-64 p-4" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
        <nav class="flex flex-col gap-4">
          <a href="封面.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">首页</a>
          <a href="公司介绍.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">关于我们</a>
          <a href="核心服务.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">核心服务</a>
          <a href="学习平台.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">学习平台</a>
          <a href="联系我们.html" class="page-btn" style="margin-top: 8px;">联系</a>
        </nav>
      </div>

      <div class="flex-1 flex flex-col justify-center px-6 lg:px-16 max-w-[1200px] mx-auto w-full">
        <h1 class="traeui-h2 mb-10 lg:mb-12" style="color: var(--traeui-accent-1); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word; font-size: clamp(32px, 4vw, 56px);">成果与影响</h1>

        <div class="grid grid-cols-3 gap-6 lg:gap-10 mb-10 lg:mb-12">
          <div class="flex flex-col items-center text-center">
            <span class="traeui-h2 whitespace-nowrap" style="color: var(--traeui-background-4); font-variant-numeric: tabular-nums; font-size: clamp(32px, 4vw, 56px);">50,000+</span>
            <span class="traeui-body-lg mt-2" style="color: var(--traeui-accent-2); font-size: clamp(12px, 1.2vw, 14px);">累计学员</span>
          </div>
          <div class="flex flex-col items-center text-center">
            <span class="traeui-h2 whitespace-nowrap" style="color: var(--traeui-background-4); font-variant-numeric: tabular-nums; font-size: clamp(32px, 4vw, 56px);">200+</span>
            <span class="traeui-body-lg mt-2" style="color: var(--traeui-accent-2); font-size: clamp(12px, 1.2vw, 14px);">企业客户</span>
          </div>
          <div class="flex flex-col items-center text-center">
            <span class="traeui-h2 whitespace-nowrap" style="color: var(--traeui-background-4); font-variant-numeric: tabular-nums; font-size: clamp(32px, 4vw, 56px);">95%</span>
            <span class="traeui-body-lg mt-2" style="color: var(--traeui-accent-2); font-size: clamp(12px, 1.2vw, 14px);">课程好评率</span>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md); padding: var(--space-10);">
          <div class="flex flex-col">
            <h2 class="traeui-h4 mb-6" style="color: var(--traeui-accent-1);">学员成果</h2>
            <ul class="flex flex-col gap-4">
              <li class="flex items-start gap-3">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" class="shrink-0 mt-0.5">
                  <path d="M4 10.5L7.5 14L16 5" stroke="var(--traeui-background-4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                <span class="traeui-body-lg" style="color: var(--traeui-accent-2); line-height: 1.5;">平均效率提升 40%</span>
              </li>
              <li class="flex items-start gap-3">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" class="shrink-0 mt-0.5">
                  <path d="M4 10.5L7.5 14L16 5" stroke="var(--traeui-background-4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                <span class="traeui-body-lg" style="color: var(--traeui-accent-2); line-height: 1.5;">85% 学员在 30 天内完成首个 AI 项目</span>
              </li>
              <li class="flex items-start gap-3">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" class="shrink-0 mt-0.5">
                  <path d="M4 10.5L7.5 14L16 5" stroke="var(--traeui-background-4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                <span class="traeui-body-lg" style="color: var(--traeui-accent-2); line-height: 1.5;">70% 学员获得晋升或加薪</span>
              </li>
            </ul>
          </div>

          <div class="flex flex-col">
            <h2 class="traeui-h4 mb-6" style="color: var(--traeui-accent-1);">客户评价</h2>
            <div class="flex-1 flex flex-col justify-center" style="border-left: 3px solid var(--traeui-background-4); padding-left: var(--space-7);">
              <p class="traeui-body-lg mb-4" style="color: var(--traeui-text-paragraph); line-height: 1.6; font-style: italic;">"NexaLearn 的实战课程让我们的团队在 2 个月内完成了 AI 工作流的全面升级。"</p>
              <span class="traeui-body-lg" style="color: var(--traeui-accent-2);">— 某科技公司 CTO</span>
            </div>
          </div>

        </div>
      </div>

      <footer class="w-full flex items-center justify-between px-6 lg:px-8 py-4" style="min-height: 56px;">
        <a href="目标用户.html" class="traeui-body" style="color: var(--traeui-accent-2); font-size: 12px; transition: color 0.2s;" onmouseover="this.style.color='var(--traeui-accent-1)'" onmouseout="this.style.color='var(--traeui-accent-2)'">PREV</a>
        <a href="联系我们.html" data-dom-id="cta-contact"
           class="inline-flex items-center justify-center whitespace-nowrap"
           style="background: var(--traeui-background-4); color: var(--traeui-text-on-accent-2); font-family: var(--font-body); font-size: 14px; font-weight: 600; border-radius: var(--radius-full); padding: 10px 28px; transition: opacity 0.15s, transform 0.1s;"
           onmouseover="this.style.opacity='0.85'; this.style.transform='translateY(-1px)';"
           onmouseout="this.style.opacity='1'; this.style.transform='translateY(0)';"
           onmousedown="this.style.transform='translateY(0) scale(0.98)';"
           onmouseup="this.style.transform='translateY(-1px)';"
        >NEXT</a>
        <span class="traeui-body-lg" style="color: var(--traeui-accent-2);">06 / 07</span>
      </footer>

    </main>
    <script>
      lucide.createIcons();
      document.getElementById('mobile-menu-btn').addEventListener('click', function() {
        const menu = document.getElementById('mobile-menu');
        menu.classList.toggle('hidden');
      });
    </script>
</body>
</html>
