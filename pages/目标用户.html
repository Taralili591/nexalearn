<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaLearn AI Academy - 目标用户</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@400;500;600&family=Roboto+Mono:wght@400;500&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@1.7.0"></script>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex flex-col min-h-screen" style="background: var(--traeui-background-1);">
      <header class="w-full flex items-center justify-between px-6 lg:px-8 py-4 shrink-0" style="background: var(--traeui-background-1);">
        <a href="封面.html" class="traeui-h5 text-base whitespace-nowrap" style="color: var(--traeui-accent-1); letter-spacing: 0.04em;">NexaLearn</a>
        <nav class="hidden md:flex items-center gap-6">
          <a href="公司介绍.html" style="color: var(--traeui-accent-2); font-family: var(--font-mono); font-size: 12px;">关于我们</a>
          <a href="核心服务.html" style="color: var(--traeui-accent-2); font-family: var(--font-mono); font-size: 12px;">核心服务</a>
          <a href="学习平台.html" style="color: var(--traeui-accent-2); font-family: var(--font-mono); font-size: 12px;">学习平台</a>
          <a href="联系我们.html" class="page-btn" style="padding: 6px 16px; font-size: 11px;">联系</a>
        </nav>
        <button id="mobile-menu-btn" class="md:hidden p-2" style="color: var(--traeui-accent-1);" aria-label="Toggle menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </header>

      <div id="mobile-menu" class="hidden md:hidden absolute top-14 right-0 z-30 w-64 p-4" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
        <nav class="flex flex-col gap-4">
          <a href="封面.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">首页</a>
          <a href="公司介绍.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">关于我们</a>
          <a href="核心服务.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">核心服务</a>
          <a href="学习平台.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">学习平台</a>
          <a href="联系我们.html" class="page-btn" style="margin-top: 8px;">联系</a>
        </nav>
      </div>

      <section class="flex-1 flex flex-col justify-center items-center px-6 lg:px-16">
        <h1 class="traeui-h2 text-center mb-3" style="color: var(--traeui-accent-1); font-size: clamp(28px, 4vw, 48px); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">
          谁适合 NexaLearn
        </h1>
        <p class="traeui-body-lg text-center mb-12 max-w-2xl" style="color: var(--traeui-text-paragraph); font-size: clamp(14px, 1.2vw, 16px); line-height: 1.6;">
          我们为以下人群提供定制化的 AI 学习路径
        </p>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 w-full max-w-6xl">
          <div class="flex flex-col items-center text-center rounded-lg p-8 transition-transform duration-150 hover:-translate-y-1 cursor-pointer" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
            <div class="flex items-center justify-center w-14 h-14 mb-5" style="color: var(--traeui-background-4);">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
            </div>
            <h3 class="traeui-h5 text-base mb-2 whitespace-nowrap" style="color: var(--traeui-accent-1); font-family: var(--font-heading); font-size: 18px; font-weight: 400;">
              职场人
            </h3>
            <p class="traeui-body" style="color: var(--traeui-accent-2); font-size: 14px; line-height: 1.6;">
              想提升 AI 能力的各岗位从业者
            </p>
          </div>

          <div class="flex flex-col items-center text-center rounded-lg p-8 transition-transform duration-150 hover:-translate-y-1 cursor-pointer" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
            <div class="flex items-center justify-center w-14 h-14 mb-5" style="color: var(--traeui-background-4);">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>
            </div>
            <h3 class="traeui-h5 text-base mb-2 whitespace-nowrap" style="color: var(--traeui-accent-1); font-family: var(--font-heading); font-size: 18px; font-weight: 400;">
              企业团队
            </h3>
            <p class="traeui-body" style="color: var(--traeui-accent-2); font-size: 14px; line-height: 1.6;">
              希望推动 AI 转型的组织
            </p>
          </div>

          <div class="flex flex-col items-center text-center rounded-lg p-8 transition-transform duration-150 hover:-translate-y-1 cursor-pointer" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
            <div class="flex items-center justify-center w-14 h-14 mb-5" style="color: var(--traeui-background-4);">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 1.66 2.69 3 6 3s6-1.34 6-3v-5"></path></svg>
            </div>
            <h3 class="traeui-h5 text-base mb-2 whitespace-nowrap" style="color: var(--traeui-accent-1); font-family: var(--font-heading); font-size: 18px; font-weight: 400;">
              高校学生
            </h3>
            <p class="traeui-body" style="color: var(--traeui-accent-2); font-size: 14px; line-height: 1.6;">
              需要培养 AI 实战能力
            </p>
          </div>

          <div class="flex flex-col items-center text-center rounded-lg p-8 transition-transform duration-150 hover:-translate-y-1 cursor-pointer" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
            <div class="flex items-center justify-center w-14 h-14 mb-5" style="color: var(--traeui-background-4);">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path></svg>
            </div>
            <h3 class="traeui-h5 text-base mb-2 whitespace-nowrap" style="color: var(--traeui-accent-1); font-family: var(--font-heading); font-size: 18px; font-weight: 400;">
              转型人群
            </h3>
            <p class="traeui-body" style="color: var(--traeui-accent-2); font-size: 14px; line-height: 1.6;">
              希望进入 AI 领域的求职者
            </p>
          </div>

        </div>
      </section>

      <footer class="w-full flex items-center justify-between px-6 lg:px-8 py-4 shrink-0" style="background: var(--traeui-background-1);">
        <a href="学习平台.html" class="traeui-body" style="color: var(--traeui-accent-2); font-size: 12px; transition: color 0.2s;" onmouseover="this.style.color='var(--traeui-accent-1)'" onmouseout="this.style.color='var(--traeui-accent-2)'">PREV</a>
        <a href="数据与成果.html" data-dom-id="cta-data" class="page-btn" style="font-family: var(--font-mono); font-size: 14px; font-weight: 500; padding: 10px 28px; border-radius: var(--radius-full); background: var(--traeui-background-4); color: var(--traeui-text-on-accent-2); border: 1.5px solid var(--traeui-background-4); text-decoration: none; transition: transform 0.1s, background 0.15s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" onmousedown="this.style.transform='scale(0.97)'" onmouseup="this.style.transform='scale(1)'">
          NEXT
        </a>
        <span class="traeui-body-lg whitespace-nowrap" style="color: var(--traeui-accent-2); font-size: 14px;">
          05 / 07
        </span>
      </footer>

    </main>
    <script>
      lucide.createIcons();
      document.getElementById('mobile-menu-btn').addEventListener('click', function() {
        const menu = document.getElementById('mobile-menu');
        menu.classList.toggle('hidden');
      });
    </script>
</body>
</html>
