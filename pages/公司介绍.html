<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 NexaLearn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@400;500;600&family=Roboto+Mono:wght@400;500&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@1.7.0"></script>
</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--traeui-background-1); color: var(--traeui-accent-1); overflow: hidden;">
    <main class="w-screen h-screen flex flex-col" style="background: var(--traeui-background-1);">
      <header class="w-full flex items-center justify-between px-6 lg:px-8 shrink-0" style="height: 56px;">
        <a href="封面.html" class="traeui-h5 text-base tracking-wider" style="color: var(--traeui-background-4);">NexaLearn</a>
        <nav class="hidden md:flex items-center gap-6">
          <a href="公司介绍.html" style="color: var(--traeui-background-4); font-family: var(--font-mono); font-size: 12px;">关于我们</a>
          <a href="核心服务.html" style="color: var(--traeui-accent-2); font-family: var(--font-mono); font-size: 12px;">核心服务</a>
          <a href="学习平台.html" style="color: var(--traeui-accent-2); font-family: var(--font-mono); font-size: 12px;">学习平台</a>
          <a href="联系我们.html" class="page-btn" style="padding: 6px 16px; font-size: 11px;">联系</a>
        </nav>
        <button id="mobile-menu-btn" class="md:hidden p-2" style="color: var(--traeui-accent-1);" aria-label="Toggle menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </header>

      <div id="mobile-menu" class="hidden md:hidden absolute top-14 right-0 z-30 w-64 p-4" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
        <nav class="flex flex-col gap-4">
          <a href="封面.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">首页</a>
          <a href="核心服务.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">核心服务</a>
          <a href="学习平台.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">学习平台</a>
          <a href="联系我们.html" class="page-btn" style="margin-top: 8px;">联系</a>
        </nav>
      </div>

      <div class="flex-1 flex items-center px-6 lg:px-16">
        <div class="flex-1 flex flex-col justify-center pr-6 lg:pr-16" style="max-width: 55%;">
          <h1 class="traeui-h2 mb-6" style="color: var(--traeui-accent-1); font-size: clamp(28px, 3.5vw, 48px); line-height: 1.1; text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">
            关于 NexaLearn
          </h1>
          <p class="traeui-body-lg mb-8" style="color: var(--traeui-text-paragraph); font-size: clamp(14px, 1.2vw, 18px); line-height: 1.7; max-width: 520px;">
            NexaLearn AI Academy 是一家面向职场人、企业团队和高校学生的 AI 在线教育公司，专注于提供实战型 AI 技能培训。
          </p>
          <p class="traeui-h4" style="color: var(--traeui-background-4); font-size: clamp(16px, 1.4vw, 22px); line-height: 1.4; max-width: 480px; text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">
            帮助用户从"了解 AI"走向"真正用 AI 提升工作、学习和业务效率"
          </p>
        </div>

        <div class="flex flex-col gap-4" style="width: clamp(280px, 30vw, 400px);">
          <div class="flex items-center gap-4 px-6 py-5 transition-transform duration-200 hover:-translate-y-1" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
              <circle cx="18" cy="18" r="14" stroke="var(--traeui-background-4)" stroke-width="2.5" fill="none"></circle>
            </svg>
            <div>
              <h3 class="traeui-h5 text-sm mb-1" style="color: var(--traeui-accent-1); font-size: 15px; letter-spacing: 0.01em;">实战导向</h3>
              <p class="traeui-body" style="color: var(--traeui-text-paragraph); font-size: 13px; line-height: 1.5;">真实项目驱动，学完即用</p>
            </div>
          </div>

          <div class="flex items-center gap-4 px-6 py-5 transition-transform duration-200 hover:-translate-y-1" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
              <rect x="8" y="8" width="20" height="20" rx="2" stroke="var(--traeui-background-4)" stroke-width="2.5" fill="none"></rect>
            </svg>
            <div>
              <h3 class="traeui-h5 text-sm mb-1" style="color: var(--traeui-accent-1); font-size: 15px; letter-spacing: 0.01em;">全岗位覆盖</h3>
              <p class="traeui-body" style="color: var(--traeui-text-paragraph); font-size: 13px; line-height: 1.5;">运营/产品/市场/销售/HR/设计</p>
            </div>
          </div>

          <div class="flex items-center gap-4 px-6 py-5 transition-transform duration-200 hover:-translate-y-1" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
              <polygon points="18,6 30,30 6,30" stroke="var(--traeui-background-4)" stroke-width="2.5" fill="none" stroke-linejoin="round"></polygon>
            </svg>
            <div>
              <h3 class="traeui-h5 text-sm mb-1" style="color: var(--traeui-accent-1); font-size: 15px; letter-spacing: 0.01em;">企业级服务</h3>
              <p class="traeui-body" style="color: var(--traeui-text-paragraph); font-size: 13px; line-height: 1.5;">定制化内训 + 落地辅导</p>
            </div>
          </div>

        </div>
      </div>

      <footer class="w-full flex items-center justify-between px-6 lg:px-8 shrink-0" style="height: 72px;">
        <a href="封面.html" class="traeui-body" style="color: var(--traeui-accent-2); font-size: 12px; transition: color 0.2s;" onmouseover="this.style.color='var(--traeui-accent-1)'" onmouseout="this.style.color='var(--traeui-accent-2)'">PREV</a>
        <a href="核心服务.html"
           data-dom-id="cta-services"
           class="inline-flex items-center justify-center whitespace-nowrap transition-transform duration-150 hover:scale-105 active:scale-95 focus-visible:outline-2 focus-visible:outline-offset-2"
           style="background: var(--traeui-background-4); color: var(--traeui-text-on-accent-2); border-radius: var(--radius-full); padding: 12px 32px; font-family: var(--font-mono); font-size: 14px; font-weight: 600; letter-spacing: 0.05em; outline-color: var(--traeui-accent-2);"
           aria-label="下一页：核心服务">
          NEXT
        </a>
        <span class="traeui-body-lg" style="color: var(--traeui-accent-2); font-size: 14px; letter-spacing: 0.08em;">02 / 07</span>
      </footer>

    </main>
    <script>
      lucide.createIcons();
      document.getElementById('mobile-menu-btn').addEventListener('click', function() {
        const menu = document.getElementById('mobile-menu');
        menu.classList.toggle('hidden');
      });
    </script>
</body>
</html>
