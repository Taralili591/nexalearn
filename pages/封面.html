<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaLearn AI Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@400;500;600&family=Roboto+Mono:wght@400;500&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@1.7.0"></script>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="relative w-screen h-screen overflow-hidden" style="background: var(--traeui-background-1);">
      <div class="absolute inset-0 z-0">
        <img src="/assets/image_0_yi19x4.jpg" alt="AI neural network visualization" class="w-full h-full object-cover" >
        <div class="absolute inset-0" style="background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.85) 100%);"></div>
      </div>

      <header class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-6 lg:px-8 py-4">
        <a href="封面.html" class="traeui-h5" style="color: var(--traeui-background-4); letter-spacing: 0.05em;">NexaLearn</a>
        <nav class="hidden md:flex items-center gap-8">
          <a href="公司介绍.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); transition: color 0.2s;" onmouseover="this.style.color='var(--traeui-background-4)'" onmouseout="this.style.color='var(--traeui-accent-1)'">关于我们</a>
          <a href="核心服务.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); transition: color 0.2s;" onmouseover="this.style.color='var(--traeui-background-4)'" onmouseout="this.style.color='var(--traeui-accent-1)'">核心服务</a>
          <a href="学习平台.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); transition: color 0.2s;" onmouseover="this.style.color='var(--traeui-background-4)'" onmouseout="this.style.color='var(--traeui-accent-1)'">学习平台</a>
          <a href="联系我们.html" class="page-btn" style="padding: 8px 20px; font-size: 12px;">联系</a>
        </nav>
        <button id="mobile-menu-btn" class="md:hidden p-2" style="color: var(--traeui-accent-1);" aria-label="Toggle menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </header>

      <div id="mobile-menu" class="hidden md:hidden absolute top-16 right-0 z-30 w-64 p-4" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
        <nav class="flex flex-col gap-4">
          <a href="公司介绍.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">关于我们</a>
          <a href="核心服务.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">核心服务</a>
          <a href="学习平台.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">学习平台</a>
          <a href="联系我们.html" class="page-btn" style="margin-top: 8px;">联系</a>
        </nav>
      </div>

      <div class="absolute inset-0 z-10 flex flex-col items-center justify-center px-6">
        <h1 class="traeui-h1 text-center animate-fade-in-up" style="color: var(--traeui-accent-1); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word; font-size: clamp(48px, 7vw, 120px);">
          NexaLearn
        </h1>
        <h2 class="traeui-h2 text-center animate-fade-in-up" style="color: var(--traeui-background-4); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word; font-size: clamp(28px, 4vw, 64px); margin-top: var(--space-4); animation-delay: 0.1s;">
          AI Academy
        </h2>

        <p class="traeui-body-lg text-center mt-6 animate-fade-in-up" style="color: var(--traeui-accent-1); font-size: clamp(16px, 2vw, 22px); font-family: var(--font-body); font-weight: 400; line-height: 1.5; max-width: 600px; animation-delay: 0.2s;">
          从了解 AI 到真正用 AI 提升效率
        </p>

        <p class="traeui-body-lg text-center mt-3 animate-fade-in-up" style="color: var(--traeui-accent-2); font-size: clamp(12px, 1.2vw, 16px); font-family: var(--font-mono); font-weight: 400; line-height: 1.5; animation-delay: 0.3s;">
          实战型 AI 技能培训平台
        </p>

        <div class="mt-12 animate-fade-in-up" style="animation-delay: 0.4s;">
          <a href="公司介绍.html" data-dom-id="cta-about" class="page-btn" style="padding: 14px 32px; font-size: 14px; font-weight: 600; letter-spacing: 0.05em;">
            NEXT
          </a>
        </div>
      </div>

      <div class="absolute bottom-6 right-6 lg:right-8 z-10">
        <span class="traeui-h5" style="color: var(--traeui-accent-2); font-size: 12px; letter-spacing: 0.05em;">01 / 07</span>
      </div>

      <div class="absolute bottom-6 left-6 z-10 animate-pulse">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--traeui-accent-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </div>

    </main>
    <script>
      lucide.createIcons();
      document.getElementById('mobile-menu-btn').addEventListener('click', function() {
        const menu = document.getElementById('mobile-menu');
        menu.classList.toggle('hidden');
      });
    </script>
</body>
</html>
