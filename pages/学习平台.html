<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 学习平台 - NexaLearn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@400;500;600&family=Roboto+Mono:wght@400;500&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@1.7.0"></script>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="relative w-screen h-screen overflow-hidden flex flex-col" style="background: var(--traeui-background-1);">
      <header class="absolute top-0 left-0 w-full flex items-center justify-between px-6 lg:px-8 py-4 z-10">
        <a href="封面.html" class="traeui-h5" style="color: var(--traeui-accent-1);">NexaLearn</a>
        <nav class="hidden md:flex items-center gap-6">
          <a href="公司介绍.html" style="color: var(--traeui-accent-2); font-family: var(--font-mono); font-size: 12px;">关于我们</a>
          <a href="核心服务.html" style="color: var(--traeui-accent-2); font-family: var(--font-mono); font-size: 12px;">核心服务</a>
          <a href="学习平台.html" style="color: var(--traeui-background-4); font-family: var(--font-mono); font-size: 12px;">学习平台</a>
          <a href="联系我们.html" class="page-btn" style="padding: 6px 16px; font-size: 11px;">联系</a>
        </nav>
        <button id="mobile-menu-btn" class="md:hidden p-2" style="color: var(--traeui-accent-1);" aria-label="Toggle menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </header>

      <div id="mobile-menu" class="hidden md:hidden absolute top-14 right-0 z-30 w-64 p-4" style="background: var(--traeui-background-2); border-radius: var(--traeui-radius-md);">
        <nav class="flex flex-col gap-4">
          <a href="封面.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">首页</a>
          <a href="公司介绍.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">关于我们</a>
          <a href="核心服务.html" class="traeui-body-lg" style="color: var(--traeui-accent-1); padding: 8px 12px; border-radius: var(--traeui-radius-sm);" onmouseover="this.style.background='var(--traeui-background-3)'" onmouseout="this.style.background='transparent'">核心服务</a>
          <a href="联系我们.html" class="page-btn" style="margin-top: 8px;">联系</a>
        </nav>
      </div>

      <div class="flex-1 flex flex-col items-center justify-center px-6">
        <h1 class="traeui-h2 mb-10 text-center" style="color: var(--traeui-accent-1); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word; font-size: clamp(32px, 4vw, 56px);">AI 学习平台</h1>

        <div class="relative flex items-center justify-center" style="width: min(70vw, 820px); aspect-ratio: 16/10;">
          <div class="w-full h-full" style="border: 1px solid var(--traeui-background-3); border-radius: var(--traeui-radius-md); overflow: hidden;">
            <img src="/assets/image_1_yi19x4.jpg" alt="NexaLearn AI 学习平台界面" class="w-full h-full object-cover" style="display: block;">
          </div>

          <div class="absolute flex items-center gap-2" style="top: -12px; left: -8px;">
            <span class="block w-2 h-2 rounded-full shrink-0" style="background: var(--traeui-background-4);"></span>
            <span class="traeui-body-lg whitespace-nowrap" style="color: var(--traeui-accent-1);">视频课程</span>
          </div>

          <div class="absolute flex items-center gap-2" style="top: -12px; right: -8px;">
            <span class="traeui-body-lg whitespace-nowrap" style="color: var(--traeui-accent-1);">直播互动</span>
            <span class="block w-2 h-2 rounded-full shrink-0" style="background: var(--traeui-background-4);"></span>
          </div>

          <div class="absolute flex items-center gap-2" style="top: 50%; left: -16px; transform: translateY(-50%);">
            <span class="block w-2 h-2 rounded-full shrink-0" style="background: var(--traeui-background-4);"></span>
            <span class="traeui-body-lg whitespace-nowrap" style="color: var(--traeui-accent-1);">AI 助教</span>
          </div>

          <div class="absolute flex items-center gap-2" style="top: 50%; right: -16px; transform: translateY(-50%);">
            <span class="traeui-body-lg whitespace-nowrap" style="color: var(--traeui-accent-1);">作业系统</span>
            <span class="block w-2 h-2 rounded-full shrink-0" style="background: var(--traeui-background-4);"></span>
          </div>

          <div class="absolute flex items-center gap-2" style="bottom: -12px; left: -8px;">
            <span class="block w-2 h-2 rounded-full shrink-0" style="background: var(--traeui-background-4);"></span>
            <span class="traeui-body-lg whitespace-nowrap" style="color: var(--traeui-accent-1);">进度追踪</span>
          </div>

          <div class="absolute flex items-center gap-2" style="bottom: -12px; right: -8px;">
            <span class="traeui-body-lg whitespace-nowrap" style="color: var(--traeui-accent-1);">证书体系</span>
            <span class="block w-2 h-2 rounded-full shrink-0" style="background: var(--traeui-background-4);"></span>
          </div>

        </div>

        <a href="目标用户.html" data-dom-id="cta-audience" class="mt-16 inline-flex items-center justify-center whitespace-nowrap" style="background: var(--traeui-background-4); color: var(--traeui-text-on-accent-2); border-radius: var(--radius-full); padding: 12px 32px; font-family: var(--font-body); font-size: 14px; font-weight: 600; letter-spacing: 0.05em; transition: transform 120ms cubic-bezier(.2,.8,.2,1), opacity 120ms cubic-bezier(.2,.8,.2,1);" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'" onfocus="this.style.outline='2px solid var(--traeui-accent-2)'; this.style.outlineOffset='2px'" onblur="this.style.outline='none'">
          NEXT
        </a>

      </div>

      <footer class="flex items-center justify-between px-6 lg:px-8 py-4 shrink-0">
        <a href="核心服务.html" class="traeui-body" style="color: var(--traeui-accent-2); font-size: 12px; transition: color 0.2s;" onmouseover="this.style.color='var(--traeui-accent-1)'" onmouseout="this.style.color='var(--traeui-accent-2)'">PREV</a>
        <span class="traeui-body-lg" style="color: var(--traeui-accent-2);">04 / 07</span>
      </footer>

    </main>
    <script>
      lucide.createIcons();
      document.getElementById('mobile-menu-btn').addEventListener('click', function() {
        const menu = document.getElementById('mobile-menu');
        menu.classList.toggle('hidden');
      });
    </script>
</body>
</html>
