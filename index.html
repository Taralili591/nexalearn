<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaLearn AI Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@400;500;600&family=Roboto+Mono:wght@400;500&family=Righteous&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Flex', sans-serif;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-family: 'Righteous', sans-serif;
            font-size: clamp(32px, 8vw, 72px);
            color: #95ff8d;
            margin-bottom: 20px;
        }
        h2 {
            font-family: 'Righteous', sans-serif;
            font-size: clamp(24px, 6vw, 48px);
            color: #fff;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #95ff8d;
            color: #000;
            text-decoration: none;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.15s, opacity 0.15s;
        }
        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NexaLearn</h1>
        <h2>AI Academy</h2>
        <a href="/pages/封面.html" class="btn">开始探索</a>
    </div>
</body>
</html>
